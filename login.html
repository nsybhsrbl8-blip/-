<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مقارنة أسعار السودان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            📶 <span>مقارنة السودان</span>
        </div>
        <div class="nav-links">
            <a href="home.html">الرئيسية</a>
            <a href="index.html">المقارنة</a>
            <a href="contact.html">اتصل بنا</a>
            <a href="login.html" class="active">تسجيل الدخول</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">دخول</button>
                <button class="tab-btn" onclick="showTab('register')">تسجيل جديد</button>
            </div>

            <!-- فورم الدخول -->
            <form id="loginForm" class="form-tab active" onsubmit="loginUser(event)">
                <input type="email" id="loginEmail" placeholder="الايميل" required>
                <input type="password" id="loginPassword" placeholder="كلمة السر" required>
                <button type="submit">دخول</button>
            </form>

            <!-- فورم التسجيل -->
            <form id="registerForm" class="form-tab" onsubmit="registerUser(event)">
                <input type="text" id="regName" placeholder="الاسم الكامل" required>
                <input type="email" id="regEmail" placeholder="الايميل" required>
                <input type="password" id="regPassword" placeholder="كلمة السر" required>
                <input type="password" id="regConfirm" placeholder="تأكيد كلمة السر" required>
                <button type="submit">انشاء حساب</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 موقع مقارنة الاسعار في السودان</p>
    </footer>

    <script>
        function showTab(tab){
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-tab').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }

        function loginUser(e){
            e.preventDefault();
            alert("تم تسجيل الدخول بنجاح!");
            window.location.href = "index.html";
        }

        function registerUser(e){
            e.preventDefault();
            let pass = document.getElementById('regPassword').value;
            let confirm = document.getElementById('regConfirm').value;
            
            if(pass !== confirm){
                alert("كلمة السر غير متطابقة!");
                return;
            }
            alert("تم انشاء الحساب بنجاح!");
            showTab('login');
        }
    </script>
</body>
</html>
