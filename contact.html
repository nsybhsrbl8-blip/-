<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - مقارنة أسعار السودان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">📶 <span>مقارنة السودان</span></div>
        <div class="nav-links">
            <a href="home.html">الرئيسية</a>
            <a href="index.html">المقارنة</a>
            <a href="contact.html" class="active">اتصل بنا</a>
            <a href="login.html">تسجيل الدخول</a>
        </div>
    </nav>

    <header><h1>اتصل بنا</h1><p>عندك اقتراح او باقة جديدة؟ راسلنا</p></header>

    <div class="contact-container">
        <form class="contact-form" onsubmit="sendMessage(event)">
            <h2>ارسل رسالة</h2>
            <input type="text" placeholder="الاسم" required>
            <input type="email" placeholder="الايميل" required>
            <textarea placeholder="اكتب رسالتك هنا" rows="5" required></textarea>
            <button type="submit">ارسال</button>
        </form>
        <div class="contact-info">
            <h2>معلومات التواصل</h2>
            <p><b>الايميل:</b> info@nabd.com</p>
            <p><b>الواتساب:</b> 249xxxxxxxxx</p>
            <p><b>المكان:</b> السودان - الخرطوم</p>
        </div>
    </div>

    <footer><p>© 2026 موقع مقارنة الاسعار في السودان</p></footer>
    <script>function sendMessage(e){e.preventDefault(); alert("شكرا لتواصلك معنا!");}</script>
</body>
</html>
